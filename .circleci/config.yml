version: 2.1

parameters:
  run_debug:
    type: boolean
    default: false

orbs:
  slack: circleci/slack@3.4.2
  node: circleci/node@6.3.0
  ruby: circleci/ruby@2.3.0

commands:
  install-dependencies:
    steps:
      - run:
          name: Check preinstalled Node versions
          command: |
            set -eu
            which node || true
            command -v node && node -v || true
            npm config get cache || true
            echo "NVM_DIR=${NVM_DIR:-<unset>}"
            command -v nvm >/dev/null && nvm ls || true
            ls -1 "${NVM_DIR:-$HOME/.nvm}/versions/node" 2>/dev/null || true
            ls -1 /opt/circleci/.nvm/versions/node 2>/dev/null || true
      - node/install
      - node/install-packages
      - ruby/install-deps
  build-site:
    steps:
      - run:
          name: build the site
          command: make build

jobs:
  build:
    docker:
      - image: cimg/ruby:3.1-node
        environment:
          BUNDLER_VERSION: 2.2.20
    steps:
      - checkout
      - install-dependencies
      - build-site
      - persist_to_workspace:
          root: '.'
          paths:
            - '_site'

  test:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - attach_workspace:
          at: '.'
      - run:
          name: run tests
          command: bundle exec rspec spec
      - run:
          name: check old URLs
          command: bundle exec ./scripts/sitemap-check --directory _site --old-urls-file OLD_URLS.yml
      - run:
          name: Run htmlproofer (no external links)
          command: bundle exec scripts/htmlproofer --internal

  e2e:
    docker:
      - image: cimg/ruby:3.1-browsers
    environment:
      SKIP_BUILD: true
    steps:
      - checkout
      - install-dependencies
      - attach_workspace:
          at: '.'
      - run:
          name: run end-to-end tests
          command: npm test

  lint-js:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - run:
          name: Lint JavaScript
          command: make lint-js

  lint-yaml:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - run:
          name: Lint YAML
          command: make lint-yaml

  typecheck-js:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - run:
          name: Typecheck JavaScript
          command: make typecheck-js

  lint-css:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - run:
          name: Lint stylesheets
          command: make lint-css

  check-optimized-assets:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - run:
          name: check optimized images
          command: make lint-assets

  check-lockfiles:
    docker:
      - image: cimg/ruby:3.1-node
    environment:
      SKIP_INSTALL: true
    steps:
      - checkout
      - install-dependencies
      - run:
          name: check lockfile differences
          command: make validate-lockfiles

  nu:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - attach_workspace:
          at: '.'
      - run:
          name: Install Java
          command: sudo apt-get update && sudo apt-get install openjdk-11-jdk
      - run:
          name: check nu HTML validator
          command: make nu

  # Running external links as a separate job so we don't fail the build directly
  # but do get the feedback/info
  test-external-links:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - attach_workspace:
          at: '.'
      - run:
          name: Run htmlproofer (external links only)
          command: bundle exec scripts/htmlproofer --external --retry-external 3 --retry-external-delay 8 --url-ignore congress.gov --url-ignore lastpass.com --url-ignore zendesk.login.gov --url-ignore apps.microsoft.com --url-ignore nccoe.nist.gov --url-ignore ssa.gov --url-ignore secretservice.gov --url-ignore kantarainitiative.org
      - slack/status:
          fail_only: true
          failure_message: ':login-gov::red_circle: external link check failed'
          only_for_branches: 'main' # don't notify Slack on a branch build

  debug-pipeline:
    docker:
      - image: cimg/ruby:3.1-node
    steps:
      - checkout
      - install-dependencies
      - run:
          name: Run staged debug checks (streamed output)
          command: |
            set -u

            echo "=== Date ==="
            date -u
            echo "=== OS ==="
            uname -a
            echo "=== Versions ==="
            node -v
            npm -v
            ruby -v
            bundle -v
            bundle exec jekyll -v
            echo "=== git status (initial) ==="
            git status --porcelain=v1

            failures=0
            failed_stages=""

            run_stage() {
              local name="$1"
              shift
              echo "=== Running stage: ${name} ==="
              if "$@"; then
                echo "=== Stage succeeded: ${name} ==="
              else
                echo "=== Stage failed: ${name} ==="
                failed_stages="${failed_stages}${name}\n"
                failures=$((failures + 1))
              fi
            }

            run_stage "01-validate-lockfiles" make validate-lockfiles
            run_stage "02-build-js" npm run build:js
            run_stage "03-build-css" npm run build:css
            run_stage "04-build-jekyll" bundle exec jekyll build --trace --verbose --config _config.yml
            run_stage "05-lint-js" make lint-js
            run_stage "06-lint-css" make lint-css
            run_stage "07-typecheck-js" make typecheck-js
            run_stage "08-tests" env SKIP_BUILD=1 npm test

            echo "=== git status (final) ==="
            git status --porcelain=v1

            if [ "$failures" -gt 0 ]; then
              echo "Detected ${failures} failing stage(s):"
              printf "%b" "$failed_stages"
              exit 1
            fi
      - store_artifacts:
          path: _site
          destination: ci-debug-site

workflows:
  version: 2
  release:
    jobs:
      - build
      - lint-js
      - lint-yaml
      - typecheck-js
      - check-optimized-assets
      - check-lockfiles
      - test:
          requires:
            - build
      - test-external-links:
          requires:
            - build
      - e2e:
          requires:
            - build
      - nu:
          requires:
            - build
  daily-external-link-checker:
    jobs:
      - build
      - test-external-links:
          requires:
            - build
    triggers:
      - schedule:
          # Once a day at 12pm
          cron: '0 12 * * *'
          filters:
            branches:
              only:
                - main
  debug:
    when: << pipeline.parameters.run_debug >>
    jobs:
      - debug-pipeline
